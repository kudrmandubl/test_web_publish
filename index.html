<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Fish Story</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://www.youtube.com/game_api/v1">// Load YT Game API code</script>
</head>
<body>

    <div id="unity-container">
        <img src="left.jpg" id="left-img" class="side-image">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <img src="right.jpg" id="right-img" class="side-image">
        <div id="loader">
            <div id="loader-wrapper">
                <div id="loader-track">
                    <div id="loader-track-inner">
                        <div id="loader-fill"></div>
                    </div>
                </div>
            </div>
            <div id="loader-text">Loading&nbsp;0%</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("unity-canvas");
        const container = document.getElementById("unity-container");

        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/playables_test.loader.js";
        const config = {
            dataUrl: buildUrl + "/playables_test.data",
            frameworkUrl: buildUrl + "/playables_test.framework.js",
            codeUrl: buildUrl + "/playables_test.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "playables_test",
            productVersion: "1.0",
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            const meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.head.appendChild(meta);
            //config.devicePixelRatio = 1;
        }

        function resizeCanvasToAspect() {
            const aspect = 3 / 4;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            let newWidth = windowWidth;
            let newHeight = windowHeight;

            if (windowWidth / windowHeight > aspect) {
                newWidth = windowWidth;
                newHeight = newWidth / aspect;

                if (newHeight > windowHeight) {
                    newHeight = windowHeight;
                    newWidth = newHeight * aspect;
                }
            }

            container.style.width = newWidth + "px";
            container.style.height = newHeight + "px";
        }

        window.addEventListener('resize', resizeCanvasToAspect);
        resizeCanvasToAspect();

        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            canvas.style.background = "transparent";

            createUnityInstance(canvas, config, (progress) => {
                let pr = (progress * 3.2) * 100;
                if (pr > 100) pr = 100;
                let rounded = Math.round(pr / 5) * 5;

                document.getElementById("loader-fill").style.width = pr + "%";
                document.getElementById("loader-text").textContent = "Loading " + rounded + "%";
            }).then((unityInstance) => {
                document.getElementById("loader").style.display = "none";
                document.getElementById("unity-container").style.backgroundImage = "none";
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);


        var unityGameInstance = null;
        // Setup the Unity section once zip file is downloaded and decompressed
        function InitUnitySection() {
            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    //progressBarFull.style.width = 100 * progress + "%";
                }).then((unityInstance) => {
                    unityGameInstance = unityInstance;
                    //loadingBar.style.display = "none";
                }).catch((message) => {
                    console.error(message);
                });
            };

            document.body.appendChild(script);
        }

        InitUnitySection();

    </script>

</body>
</html>
